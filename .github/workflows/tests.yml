name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Run tests
        run: |
          xcodebuild test \
            -project binger.xcodeproj \
            -scheme binger \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
